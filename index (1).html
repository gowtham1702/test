<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inkwell & Co. — Pens</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--ink-navy:#1B2430;--ink-navy-deep:#131A24;--paper:#F7F5F0;--paper-dim:#EDEAE2;--brass:#B08D57;--brass-light:#D4B483;--graphite:#2A2A28;--burgundy:#6B2337}*{margin:0;padding:0;box-sizing:border-box}body{background:var(--paper);color:var(--graphite);font-family:Inter,sans-serif;line-height:1.6}.eyebrow{font-family:"IBM Plex Mono",monospace;font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--brass)}header{background:var(--ink-navy-deep);color:var(--paper);padding:1.4rem 6vw;display:flex;justify-content:space-between;align-items:center}.brand{font-family:Fraunces,serif;font-size:1.3rem}nav{display:flex;gap:2rem}nav a{color:var(--paper-dim);text-decoration:none}.hero{background:radial-gradient(ellipse at top left,var(--ink-navy),var(--ink-navy-deep)65%);color:#fff;padding:8vh 6vw;text-align:center}.hero h1{font-family:Fraunces,serif;font-size:3rem;margin:1rem}.catalog{padding:6vw}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:2rem}.card{background:#fff;border:1px solid #ddd;padding:1.5rem}.swatch{height:90px;margin-bottom:1rem}.stats{background:var(--ink-navy-deep);color:#fff;padding:2rem;display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));text-align:center}.reviews{padding:6vw;background:var(--paper-dim)}.review-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:2rem}.review{background:#fff;padding:1rem;border-left:3px solid var(--brass)}footer{background:var(--ink-navy-deep);color:#fff;padding:2rem}
</style>
</head>
<body><header><span class="brand">Inkwell &amp; Co.</span><nav><a href="#catalog">Pens</a><a href="#reviews">Reviews</a></nav></header>
<section class="hero"><span class="eyebrow">Est. 2019 · Handwriting Instruments</span><h1>Four pens. One idea: slow down.</h1><p>A small catalog of everyday writing tools.</p></section>
<section class="catalog" id="catalog"><h2>Our Pens</h2><div class="grid"><div class="card"><div class="swatch" style="background:#333"></div><h3>The Meridian</h3><p>$128.00</p></div></div></section>
<section class="stats"><div><div>4</div><div>Pens</div></div></section>
<section class="reviews" id="reviews"><h2>Reviews</h2><div class="review-grid"><div class="review">Great pen!</div></div></section>
<footer>© 2026 Inkwell &amp; Co.</footer></body></html>
